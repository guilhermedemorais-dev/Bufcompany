<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Buf Company</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
</head>
<body class="is--dark">
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <div class="nav__left">
        <a href="/" class="nav__logo">
          <img src="logo.png" alt="Buf Company" id="nav-logo">
        </a>
      </div>
      <div class="nav__right" id="nav-menu">
        <button class="nav__close" id="nav-close" aria-label="Fechar menu">✕</button>
        <a href="/#servicos" class="nav__link">Solutions</a>
        <a href="/#featured" class="nav__link">Partners</a>
        <a href="/#sobre-nos" class="nav__link">About Us</a>
        <a href="/#contato" class="nav__link">Contact</a>
        <a href="/contact" class="nav__cta">Talk to an Expert</a>
      </div>
      <button class="nav__hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="section" style="padding-top: 8em;">
    <div class="container">
      <div class="contact-form-wrap">
        <h2 class="h2">Talk to an<br><span class="text-gold">Expert</span></h2>
        <p style="margin-bottom: 3em; max-width: 400px;">Start your business upgrade today. Fill out the form below and our team will get back to you shortly.</p>
        
        <form class="modal__form" id="mobile-contact-form" action="submit-form.php" method="post" data-contact-form>
          <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-input" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Corporate Email</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="name@company.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="company">Company</label>
            <input type="text" id="company" name="company" class="form-input" placeholder="Your company name">
          </div>
          <div class="form-group">
            <label class="form-label" for="message">How can we help?</label>
            <textarea id="message" name="message" class="form-textarea" placeholder="Tell us about your project..." required></textarea>
          </div>
          <div class="form-honeypot" aria-hidden="true">
            <label for="mobile-company-website">Website</label>
            <input type="text" id="mobile-company-website" name="website" tabindex="-1" autocomplete="off">
          </div>
          <button type="submit" class="btn" style="width: 100%; border-radius: 0;">SUBMIT REQUEST <span class="btn__arrow">→</span></button>
          <p class="form-status" data-form-status aria-live="polite"></p>
        </form>
      </div>
    </div>
  </section>

  <script>
    const lenis = new Lenis();
    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    // ─── Navbar Logic (Sync from index.html) ───
    const nav = document.getElementById('nav');
    if (nav) {
      window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 60);
      });
    }

    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    const navClose = document.getElementById('nav-close');

    if (hamburger && navMenu) {
      hamburger.addEventListener('click', () => {
        navMenu.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    }

    if (navClose && navMenu) {
      navClose.addEventListener('click', () => {
        navMenu.classList.remove('open');
        document.body.style.overflow = '';
      });
    }

    navMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navMenu.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
  </script>
  <script src="form-handler.js"></script>
</body>
</html>
